<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>
    <meta name="description" content="Contactez-moi pour échanger sur DAFA ou vos projets UI/UX.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">DESIGNER.PRO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">CV & Parcours</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="text-center mb-4">Travaillons ensemble</h1>
            <p class="text-center text-muted mb-5">Intéressé par le projet DAFA ou besoin d'un designer ? Laissez-moi un message.</p>
            
            <form action="#" method="POST" class="shadow-sm p-4 bg-white rounded border">
                <div class="mb-3">
                    <label for="nom" class="form-label fw-bold">Votre Nom</label>
                    <input type="text" class="form-control" id="nom" name="nom" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Votre Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="john@exemple.com" required>
                </div>
                <div class="mb-4">
                    <label for="message" class="form-label fw-bold">Votre Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" placeholder="Bonjour, je vous contacte pour..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Envoyer le message</button>
            </form>
        </div>
    </div>
</main>

<footer class="bg-dark text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-0">&copy; 2026 - Portfolio Personnel.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
