<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactez-moi pour discuter design, UX/UI, ou du projet DAFA.">
    <title>Portfolio | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="apple-theme d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">Portfolio</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">CV & Méthode</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="text-center mb-5 animate-fade-in">
                    <h1 class="display-5 fw-bold tracking-tight">Démarrons un projet.</h1>
                    <p class="text-muted fs-5">Une question sur mon approche ou sur le prototype DAFA ? Parlons-en.</p>
                </div>
                
                <form action="#" class="animate-fade-in" style="animation-delay: 0.1s;">
                    <p class="small text-muted mb-4">Les champs suivis d'un astérisque (<span class="text-danger" aria-hidden="true">*</span>) sont obligatoires.</p>

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold text-muted small text-uppercase">Nom complet <span class="text-danger" aria-hidden="true">*</span></label>
                        <input type="text" class="form-control apple-input py-2" id="name" placeholder="Votre nom" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-muted small text-uppercase">Adresse email <span class="text-danger" aria-hidden="true">*</span></label>
                        <input type="email" class="form-control apple-input py-2" id="email" placeholder="nom@exemple.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="message" class="form-label fw-semibold text-muted small text-uppercase">Votre message <span class="text-danger" aria-hidden="true">*</span></label>
                        <textarea class="form-control apple-input" id="message" placeholder="Comment puis-je vous aider ?" style="height: 150px" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold btn-apple">Envoyer le message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-4 border-top mt-auto">
        <p class="mb-0 text-muted small">&copy; 2026 Portfolio.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
