<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactez le concepteur de l'application DAFA.">
    <title>DAFA App | Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">DAFA APP</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Le Prototype</a></li>
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="text-center mb-4">
                    <h1 class="fw-bold">Discutons de DAFA</h1>
                    <p class="text-muted">Une question sur l'UX ou le prototype Figma ?</p>
                </div>
                
                <form action="#" class="bg-white p-5 shadow-sm rounded border-0 animate-fade-in">
                    <div class="mb-4">
                        <label for="name" class="form-label fw-bold">Votre Nom <span class="text-danger" aria-hidden="true">*</span></label>
                        <input type="text" id="name" class="form-control bg-light" required placeholder="Ex: John Doe">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold">Email <span class="text-danger" aria-hidden="true">*</span></label>
                        <input type="email" id="email" class="form-control bg-light" required placeholder="contact@domaine.com">
                    </div>
                    <div class="mb-4">
                        <label for="message" class="form-label fw-bold">Message <span class="text-danger" aria-hidden="true">*</span></label>
                        <textarea id="message" class="form-control bg-light" rows="5" required placeholder="Tapez votre message ici..."></textarea>
                    </div>
                    <div class="alert alert-info py-2" role="alert">
                        <small>Les champs avec un astérisque (*) sont obligatoires.</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold btn-hover-scale">Envoyer</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-0">&copy; 2026 DAFA App</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
